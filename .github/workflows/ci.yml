name: CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      TEST_DATABASE_URL: postgresql://f1stats_user:dev123@localhost:5432/f1stats_test

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: f1stats_user
          POSTGRES_PASSWORD: dev123
          POSTGRES_DB: f1stats_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13.2'
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run ruff linter
        run: ruff check .
      - name: Run mypy type checker
        run: mypy .
      - name: Run tests
        run: python -m pytest tests/